name: Build UniversalHook

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Clone and prepare dependencies
        run: |
          # استنساخ fishhook
          git clone https://github.com/facebook/fishhook.git
          # استنساخ Dobby
          git clone https://github.com/jmpews/Dobby.git
          
          # بناء Dobby
          cd Dobby
          mkdir -p build && cd build
          cmake .. -DDOBBY_GENERATE_SHARED=OFF -DCMAKE_BUILD_TYPE=Release
          make -j$(sysctl -n hw.ncpu)
          cd ../..
          
          # تجهيز المجلدات بالشكل الذي يتوقعه الكود
          # الكود يتضمن #include "Dobby/dobby.h" و #include "fishhook/fishhook.h"
          # لذلك ننشئ مجلد Dobby وننسخ إليه الملف من include/
          mkdir -p Dobby_hdr
          cp Dobby/include/dobby.h Dobby_hdr/
          # ننشئ مجلد fishhook وننسخ إليه الملف
          mkdir -p fishhook_hdr
          cp fishhook/fishhook.h fishhook_hdr/
          
          # الآن أصبح لدينا:
          # ./Dobby_hdr/dobby.h
          # ./fishhook_hdr/fishhook.h
          # سنستخدم -I. ليشمل المجلد الحالي، ثم نضيف مجلدات الرأس المؤقتة

      - name: 🔨 Build UniversalHook.dylib
        run: |
          clang++ -dynamiclib -std=c++17 -O2 -Wall \
            -framework Foundation -framework CoreFoundation -framework AppKit \
            -I. \
            -I./Dobby_hdr \
            -I./fishhook_hdr \
            -L./Dobby/build \
            -ldobby \
            -o UniversalHook.dylib \
            UniversalHook.mm

      - name: 📦 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UniversalHook-macOS
          path: UniversalHook.dylib
