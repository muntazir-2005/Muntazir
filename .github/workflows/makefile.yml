name: Build UniversalHook

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:   # يسمح بالتشغيل اليدوي

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Clone dependencies
        run: |
          git clone https://github.com/facebook/fishhook.git
          git clone https://github.com/jmpews/Dobby.git
          cd Dobby
          mkdir build && cd build
          cmake .. -DDOBBY_GENERATE_SHARED=OFF -DCMAKE_BUILD_TYPE=Release
          make -j$(sysctl -n hw.ncpu)
          cd ../..

      - name: 🔨 Build UniversalHook.dylib
        run: |
          clang++ -dynamiclib -std=c++17 -O2 -Wall \
            -framework Foundation -framework CoreFoundation -framework AppKit \
            -I./Dobby/include -I./fishhook \
            -L./Dobby/build -ldobby \
            -o UniversalHook.dylib \
            UniversalHook.mm

      - name: 📦 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UniversalHook-macOS
          path: UniversalHook.dylib
